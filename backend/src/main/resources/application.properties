spring.application.name=food-delivery-api
server.port=8080

# Database
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# CORS — override in application-prod.properties
app.cors.allowed-origins=http://localhost:3000,http://localhost:19006,exp://

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Supabase Storage
app.supabase.url=${SUPABASE_URL:}
app.supabase.service-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.supabase.bucket=${SUPABASE_BUCKET:food-images}

# Logging
logging.level.com.fooddelivery=INFO
logging.level.org.springframework.security=WARN
