# Production overrides — activated with: SPRING_PROFILES_ACTIVE=prod

# Safe DDL — never auto-alter schema in production
spring.jpa.hibernate.ddl-auto=validate

# Larger connection pool for production traffic
spring.datasource.hikari.maximum-pool-size=20

# CORS — comma-separated list of allowed origins (no wildcards)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-app-domain.com}

# Logging — suppress noise, keep warnings
logging.level.com.fooddelivery=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
