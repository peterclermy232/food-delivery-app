services:
  - type: web
    name: dfood-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Fill these in Render's dashboard under Environment → Secret Files
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      # Comma-separated list of Expo/app origins — add your Render URL itself too
      # e.g. https://dfood-api.onrender.com,exp://
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    autoDeploy: true
