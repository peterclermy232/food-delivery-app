services:
  - type: web
    name: dfood-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Fill these in Render's dashboard under Environment → Secret Files
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      # Comma-separated list of allowed origins
      # e.g. https://food-delivery-app-t5ru.onrender.com,exp://
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Supabase project URL, e.g. https://xxxxx.supabase.co
      - key: SUPABASE_URL
        sync: false
      # Supabase service_role key (Project Settings → API) — server-side only, never expose to the app
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Storage bucket name (must exist and be public) — defaults to food-images if unset
      - key: SUPABASE_BUCKET
        sync: false
    autoDeploy: true
